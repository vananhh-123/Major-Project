<section class="logout-page">
  <div class="logout-card">
    <div class="logout-icon">
      <span class="material-symbols-outlined">logout</span>
    </div>

    <h2>Logout Admin Account?</h2>

    <p>
      You are about to leave JUST4QUIZ Admin Console.
      Make sure all changes have been saved before logging out.
    </p>

    <div class="logout-actions">
      <button class="cancel-btn" routerLink="/admin">
        Cancel
      </button>

      <button class="logout-btn" (click)="confirmLogout()">
        Confirm Logout
      </button>
    </div>
  </div>
</section>
