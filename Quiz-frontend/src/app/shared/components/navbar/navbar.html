<nav class="navbar-container">
  <div class="nav-left">
    <div class="logo">JUST4QUIZ</div>
  </div>

  <div class="nav-center" *ngIf="type === 'profile' || type === 'dashboard'">
    <a class="nav-link" routerLink="/app/dashboard" routerLinkActive="active-link">Home</a>
    <a class="nav-link" routerLink="/app/quizzes" routerLinkActive="active-link">Quizzes</a>
    <a class="nav-link" routerLink="/app/leaderboard" routerLinkActive="active-link">Leaderboard</a>
    <a class="nav-link" routerLink="/app/profile" routerLinkActive="active-link">Profile</a>
  </div>

  <div class="nav-right">
    <div class="auth-buttons" *ngIf="type === 'home'">
      <a class="btn-text" routerLink="/login">Sign In</a>
      <a class="btn-primary" routerLink="/register">Sign Up</a>
    </div>

    <div class="auth-switch" *ngIf="type === 'auth-signin'">
      <span class="switch-text">
        Don't have an account?
        <a routerLink="/register" class="link-purple">Sign up here</a>
      </span>
    </div>

    <div class="auth-switch" *ngIf="type === 'auth-signup'">
      <span class="switch-text">
        Already a member?
        <a routerLink="/login" class="link-purple">Sign in here</a>
      </span>
    </div>

    <button
      *ngIf="isAdmin && (type === 'profile' || type === 'dashboard')"
      type="button"
      class="admin-console-btn"
      (click)="goToAdmin($event)"
      title="Back to Admin Console"
    >
      <span class="material-symbols-outlined">admin_panel_settings</span>
      Admin Console
    </button>

    <div
      class="profile-menu"
      *ngIf="type === 'profile' || type === 'dashboard'"
      routerLink="/app/profile"
    >
      <span class="profile-name">{{ username }}</span>

      <div class="avatar-circle">
        <img
          [src]="avatar || '/User.png'"
          alt="Avatar"
          class="avatar-img"
          onerror="this.src='https://via.placeholder.com/36?text=U'"
        />
      </div>

      <span class="material-icons drop-icon">expand_more</span>
    </div>
  </div>
</nav>
